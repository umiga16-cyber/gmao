<!-- src/main/resources/templates/login.html -->
<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAO - Connexion Industrielle</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1><i class="fas fa-industry"></i> GMAO</h1>
                <p>Gestion de la Maintenance Assistée par Ordinateur</p>
            </div>          
            <form method="post" action="/login">
                <div class="form-group">
                    <label><i class="fas fa-user me-2"></i> Email</label>
                    <input type="email" name="email" required 
                           placeholder="utilisateur@gmao.com" autocomplete="email">
                </div>               
                <div class="form-group">
                    <label><i class="fas fa-lock me-2"></i> Mot de passe</label>
                    <input type="password" name="password" required 
                           placeholder="mot de passe">
                </div>              
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt me-2"></i>
                    ACCÉDER AU SYSTÈME
                </button>
                <div th:if="${param.error}" class="alert alert-danger">
                    <p style="color: red;">Email ou mot de passe incorrect</p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
