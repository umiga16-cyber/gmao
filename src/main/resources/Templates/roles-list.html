<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAO - Gestion des Rôles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f6f8fb; font-family: Arial, sans-serif; }
        .page { max-width: 1000px; margin: 30px auto; }
        .card { border:0; border-radius:18px; box-shadow:0 8px 24px rgba(0,0,0,.06); }
    </style>
</head>
<body>
<div class="page">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Rôles</h2>
            <div class="text-muted">Ajouter les rôles avant de créer des utilisateurs</div>
        </div>
        <a href="/users" class="btn btn-outline-secondary">Retour utilisateurs</a>
    </div>

    <div class="card p-3 mb-3">
        <form id="roleForm" class="row g-3">
            <div class="col-md-8">
                <label class="form-label">Nom du rôle</label>
                <input id="roleName" class="form-control" placeholder="ADMIN / TECHNICIAN / SUPERVISOR / OPERATOR">
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button class="btn btn-primary w-100" type="submit">Ajouter rôle</button>
            </div>
        </form>
        <div class="alert alert-danger mt-3 d-none" id="roleError"></div>
    </div>

    <div class="card p-3">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                </tr>
                </thead>
                <tbody id="rolesTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../JS/role.js">
   
</script>
</body>
</html>
